name: Robinson-Gaming4free.net-AutoRenew

on:
  schedule:
    - cron: '23 18 */2 * *'
  workflow_dispatch:

jobs:
  run-addtime:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 下载本仓库脚本
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Google Chrome 浏览器 (DrissionPage 核心依赖)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: 安装 Python 依赖及虚拟显示器
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install DrissionPage requests DataRecorder DownloadKit FlowViewer lxml websocket-client psutil
          sudo apt-get install -y xvfb

      - name: 安装、配置并启动 Cloudflare WARP
        run: |
          # 1. 添加官方源
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          # 2. 启动并使能 warp-svc 后台服务
          sudo systemctl start warp-svc
          sudo systemctl enable warp-svc
          sleep 3
          
          # 3. 注册并连接（适配新版 warp-cli 语法）
          warp-cli registration new
          warp-cli mode warp
          warp-cli connect
          
          # 4. 循环等待直到连接成功
          echo "等待 WARP 分配 IP..."
          for i in {1..6}; do
            if warp-cli status | grep -q "Connected"; then
              echo " WARP 连接成功！"
              break
            fi
            sleep 5
          done
          
          # 5. 验证当前出口 IP
          echo "当前网络出口信息："
          curl -s https://www.cloudflare.com/cdn-cgi/trace | grep -E "ip|loc|warp"

      - name: 运行续期脚本
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 此时 main.py 已经在根目录，直接运行即可
          xvfb-run --server-args="-screen 0 1920x1080x24" python main.py
